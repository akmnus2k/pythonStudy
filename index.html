<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📋 待办清单</title>
<style>
  /* 浅蓝低饱和主题 */
  :root {
    --primary: #A8D4EA;
    --primary-dark: #7FB5D4;
    --bg: #F7FBFD;
    --card: #FFFFFF;
    --soft: #E9F3F8;
    --text: #3D4F5C;
    --text-strong: #2C4A5E;
    --muted: #8AA3B2;
    --p2: #B3A7D6;   /* 第二个人的柔和淡紫：区分"谁完成了什么"，避开红/橙 */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    max-width: 560px; margin-inline: auto;
  }
  h1 { font-size: 1.5rem; color: var(--text-strong); }
  h2 { font-size: 1.05rem; margin: 20px 0 8px; color: var(--text-strong); }

  button {
    border: none; border-radius: 10px; cursor: pointer;
    font-size: 0.95rem; color: var(--text-strong);
    padding: 10px 14px; background: var(--soft);
  }
  button:active { transform: scale(0.98); }
  .primary { background: var(--primary); font-weight: 600; }
  .big { width: 100%; padding: 14px; font-size: 1.05rem; }
  .active-btn { background: var(--primary-dark); }

  .card {
    background: var(--card); border: 1px solid var(--soft);
    border-radius: 12px; padding: 8px 12px; margin-bottom: 8px;
  }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .card .info { flex: 1; min-width: 0; }
  .next-step { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

  /* 外层只有 任务信息+打卡；点任务展开内层编辑面板 */
  .card .info { cursor: pointer; }
  .edit-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; font-size: 0.9rem; }
  .edit-row input[type=text] { flex: 1; }
  .edit-row select { padding: 8px; border: 1px solid var(--soft); border-radius: 8px;
                     background: var(--bg); color: var(--text); font-size: 0.95rem; }
  .edit-row input[type=number] { width: 70px; padding: 8px; }
  .panel-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .panel-actions .spacer { flex: 1; }
  .panel-actions button {
    font-size: 0.85rem; color: var(--muted);
    background: var(--bg); border: 1px solid var(--soft);
  }

  .subs { margin-top: 8px; border-top: 1px solid var(--soft); padding-top: 8px; }
  .sub-line { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.92rem; }
  .sub-line input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--primary-dark); }
  .sub-line .sub-name { flex: 1; }
  .sub-line .sub-done { color: var(--muted); text-decoration: line-through; }
  .sub-line button { padding: 2px 8px; background: none; color: var(--muted); }
  .sub-add { display: flex; gap: 6px; margin-top: 6px; }
  .sub-add input { flex: 1; padding: 8px; }
  .card .name { font-weight: 600; color: var(--text-strong); }
  .fire { color: var(--muted); font-size: 0.85rem; }

  .track { background: var(--soft); border-radius: 6px; height: 8px; margin-top: 8px; overflow: hidden; }
  .fill { background: var(--primary); height: 100%; border-radius: 6px; transition: width 0.3s; }
  .count { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .done-line { color: var(--muted); padding: 4px 2px; cursor: pointer; }
  .done-line s { margin-right: 6px; }
  .due { font-size: 0.8rem; color: var(--muted); margin-left: 6px; }

  /* 列表内的折叠组（已完成/兴趣区），比设置类details轻量 */
  details.fold { margin: 4px 0 10px; padding: 8px 12px; }
  details.fold > summary { color: var(--muted); font-size: 0.9rem; font-weight: normal; }
  details.fold.section > summary {
    color: var(--text-strong); font-size: 1.05rem; font-weight: 600;
  }

  #flash {
    position: sticky; top: 8px; z-index: 10;
    background: var(--primary); color: var(--text-strong);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
    display: none; font-weight: 500;
  }
  /* 回顾：日历弹窗——点某天看两人的完成情况和留言 */
  .modal {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(44, 74, 94, 0.35);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px 12px; overflow-y: auto;
  }
  .modal-card {
    background: var(--card); border-radius: 16px; width: 100%; max-width: 520px;
    padding: 14px 16px 18px; box-shadow: 0 12px 40px rgba(44, 74, 94, 0.25);
  }
  .modal-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  #calMonth { flex: 1; text-align: center; font-weight: 700; color: var(--text-strong); font-size: 1.05rem; }
  .modal-head button { background: var(--soft); color: var(--text-strong); padding: 6px 12px; font-size: 1rem; }
  #calPrev, #calNext { min-width: 40px; }
  #calNext.disabled { opacity: 0.35; cursor: default; }
  #reviewClose { background: none; color: var(--muted); font-size: 1.1rem; }

  #calGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-wk { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 2px 0; }
  .cal-cell {
    aspect-ratio: 1 / 1; min-height: 38px; border-radius: 9px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 0.9rem; color: var(--text); cursor: pointer;
    background: var(--bg); border: 1px solid transparent;
  }
  .cal-cell.blank { background: none; cursor: default; }
  .cal-cell.future { color: var(--muted); opacity: 0.4; cursor: default; }
  .cal-cell.has-act { background: var(--soft); }
  .cal-cell.today { border-color: var(--primary-dark); font-weight: 700; }
  .cal-cell.selected { background: var(--primary); color: var(--text-strong); font-weight: 700; }
  .cal-dots { display: flex; gap: 3px; height: 6px; margin-top: 3px; }
  .cal-dot { width: 6px; height: 6px; border-radius: 50%; }
  .cal-dot.mine { background: var(--primary-dark); }
  .cal-dot.other { background: var(--p2); }
  .cal-cell.selected .cal-dot { background: var(--card); }

  #dayDetail { margin-top: 14px; border-top: 1px solid var(--soft); padding-top: 10px; }
  .review-date { font-weight: 700; color: var(--text-strong); margin-bottom: 8px; }
  .review-done { font-size: 0.92rem; margin: 4px 0; }
  .review-msg { color: var(--text); font-size: 0.9rem; margin: 3px 0; }
  .review-msg.other { color: var(--muted); }
  .review-empty { color: var(--muted); text-align: center; padding: 20px 0; }
  .p-mine { color: var(--primary-dark); font-weight: 600; }
  .p-other { color: var(--p2); font-weight: 600; }

  details {
    background: var(--card); border: 1px solid var(--soft);
    border-radius: 12px; padding: 12px 14px; margin-top: 20px;
  }
  summary { cursor: pointer; font-weight: 600; color: var(--text-strong); }
  form label { display: block; margin: 10px 0 4px; font-size: 0.9rem; }
  input[type=text], input[type=number], select {
    width: 100%; padding: 10px; border: 1px solid var(--soft);
    border-radius: 8px; background: var(--bg); color: var(--text); font-size: 1rem;
  }
  .radio-row { display: flex; gap: 8px; }
  .radio-row label {
    flex: 1; text-align: center; margin: 0; padding: 10px 0;
    background: var(--bg); border: 1px solid var(--soft); border-radius: 8px; cursor: pointer;
  }
  .radio-row input { display: none; }
  .radio-row input:checked + span { font-weight: 700; }
  .radio-row label:has(input:checked) { background: var(--primary); color: var(--text-strong); }

  #profileTabs { display: flex; gap: 6px; margin-bottom: 4px; }
  #profileTabs button {
    padding: 6px 16px; font-size: 0.85rem; color: var(--muted);
    background: var(--soft); border-radius: 999px;
  }
  #profileTabs button.active {
    background: var(--primary); color: var(--text-strong); font-weight: 600;
  }
  #tabSwap { order: 3; background: none; padding: 6px 8px; }

  /* 顶部：大时钟（对抗时间盲）+ 缩小版🎲 */
  #topRow { display: flex; align-items: center; gap: 10px; margin: 2px 0 12px; }
  #clock {
    flex: 1; font-size: 2.4rem; font-weight: 700; color: var(--text-strong);
    letter-spacing: 2px; cursor: pointer;
    font-variant-numeric: tabular-nums;   /* 等宽数字，跳分钟时不晃动 */
  }
  #clock .clock-date { font-size: 1.35rem; letter-spacing: normal; }

  /* 正在做：置顶显示"某某正在做什么"，浅蓝底 */
  #doingBox {
    background: var(--primary); border-radius: 10px;
    padding: 8px 12px; margin-bottom: 10px; font-size: 0.92rem; color: var(--text-strong);
  }
  .doing-me { display: flex; align-items: center; gap: 6px; }
  .doing-me > span { flex: 1; cursor: pointer; }
  .doing-me button { background: rgba(255,255,255,0.55); color: var(--text-strong); padding: 2px 9px; }
  .doing-other { opacity: 0.75; margin-top: 4px; }
  .doing-note-input {
    width: 100%; font: inherit; color: var(--text-strong);
    border: none; border-bottom: 2px solid var(--text-strong);
    background: transparent; outline: none; padding: 0;
  }
  /* 卡片上两个图标方框按钮：▶ 在做、✓ 完成 */
  .doing-btn { background: var(--soft); color: var(--text-strong); padding: 8px 12px; font-size: 1rem; }
  .check-btn { background: var(--soft); color: var(--text-strong); padding: 8px 13px; font-size: 1rem; font-weight: 700; }

  /* 留言板：两人的状态和留言合并成一条时间线 */
  #statusBox {
    background: var(--soft); border-radius: 10px;
    padding: 8px 12px; margin-bottom: 10px; font-size: 0.9rem;
  }
  #msgInputRow { display: flex; gap: 6px; }
  #msgInputRow input {
    flex: 1; padding: 8px; border: 1px solid var(--card);
    border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.95rem;
  }
  #msgInputRow button { padding: 6px 12px; }
  #msgList { margin-top: 4px; }
  #msgList.expanded { max-height: 220px; overflow-y: auto; }  /* 上下滑动看全部 */
  .msg { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
  .msg span { flex: 1; }
  .msg.other { color: var(--muted); }
  .msg button { background: none; color: var(--muted); padding: 0 6px; }
  #msgMore { background: none; color: var(--muted); font-size: 0.8rem; padding: 4px 0 0; }

  /* 今日战报：正反馈要看得见 */
  #todayDone {
    background: var(--soft); border-radius: 10px;
    padding: 8px 12px; margin-bottom: 12px;
    font-size: 0.9rem; color: var(--text);
  }

  h1 { cursor: pointer; }
  h1 input {
    font: inherit; color: var(--text-strong); width: 60%;
    border: none; border-bottom: 2px solid var(--primary);
    background: transparent; outline: none; padding: 0;
  }
  .data-row {
    display: flex; gap: 8px; margin-top: 12px;
    border-top: 1px solid var(--soft); padding-top: 10px;
  }
  .data-row button { flex: 1; font-size: 0.85rem; color: var(--muted); }
  .empty { text-align: center; padding: 30px 0; color: var(--muted); font-size: 1.1rem; }
</style>
</head>
<body>

<div id="flash"></div>
<div id="profileTabs">
  <button data-p="1">我的</button>
  <button data-p="2">她的</button>
  <button id="tabSwap" title="调换两个档案的显示顺序">⇄</button>
</div>
<h1 id="pageTitle" title="点击修改名称">📋 待办清单</h1>

<div id="topRow">
  <div id="clock" title="点击看日期">--:--</div>
  <button id="reviewBtn" class="primary">📅 回顾</button>
</div>
<div id="doingBox" style="display:none"></div>
<div id="statusBox">
  <div id="msgInputRow">
    <input id="msgInput" type="text" maxlength="60" placeholder="💬 说点什么…（备课ing、给TA留言）">
    <button id="msgSend" class="primary">发送</button>
  </div>
  <div id="msgList"></div>
  <button id="msgMore" style="display:none"></button>
</div>
<div id="todayDone" style="display:none"></div>
<div id="reviewModal" class="modal" style="display:none">
  <div class="modal-card">
    <div class="modal-head">
      <button id="calPrev" title="上个月">‹</button>
      <div id="calMonth"></div>
      <button id="calNext" title="下个月">›</button>
      <button id="reviewClose" title="关闭">✕</button>
    </div>
    <div id="calGrid"></div>
    <div id="dayDetail"></div>
  </div>
</div>

<div id="main"></div>

<details id="addBox">
  <summary>➕ 添加任务</summary>
  <form id="addForm">
    <label>任务名称</label>
    <input type="text" id="fName" autocomplete="off">
    <label>类别</label>
    <div class="radio-row" id="catRow">
      <label><input type="radio" name="cat" value="日常" checked><span>日常</span></label>
      <label><input type="radio" name="cat" value="近期"><span>近期</span></label>
      <label><input type="radio" name="cat" value="兴趣"><span>兴趣</span></label>
    </div>
    <label>优先级</label>
    <select id="fPriority">
      <option value="1">优先</option>
      <option value="2" selected>普通</option>
      <option value="3">可推迟</option>
    </select>
    <div id="timesWrap">
      <label>频率</label>
      <div class="edit-row" style="margin-top:0" id="fFreqRow">
        <span>每</span>
        <select id="fPeriod">
          <option value="天">天</option>
          <option value="周">周</option>
          <option value="月">月</option>
        </select>
        <input type="number" id="fTimes" min="1" max="50" value="8">
        <span>次</span>
      </div>
      <label style="cursor:pointer;font-weight:normal;margin-top:8px">
        <input type="checkbox" id="fTrack"> 完成后保留·显示上次时间（不自动重置）
      </label>
    </div>
    <div id="dueWrap" style="display:none">
      <label>截止日期（可不填，按它倒计时）</label>
      <input type="date" id="fDue">
    </div>
    <br>
    <button type="submit" class="primary big">添加</button>
  </form>
</details>

<details id="syncBox">
  <summary>☁ 云同步 <span id="syncState" class="fire"></span></summary>
  <div id="syncOff">
    <p style="font-size:0.9rem">首次设置：粘贴你的 Firebase 数据库网址。<br>
       其他设备：粘贴第一台设备上生成的同步码。</p>
    <input type="text" id="syncInput" placeholder="https://xxx.firebasedatabase.app 或同步码" autocomplete="off">
    <br><br>
    <button id="syncEnable" class="primary big">启用同步</button>
  </div>
  <div id="syncOn" style="display:none">
    <p style="font-size:0.9rem">同步码（在手机等其他设备的云同步里粘贴它）：</p>
    <input type="text" id="syncCode" readonly>
    <br><br>
    <button id="syncCopy">📋 复制同步码</button>
    <button id="syncDisable">断开同步</button>
  </div>
  <div class="data-row">
    <button id="exportBtn">⬇ 导出数据</button>
    <button id="importBtn">⬆ 导入数据</button>
    <input type="file" id="importFile" accept=".json" hidden>
  </div>
</details>

<script>
"use strict";
// 脚本一旦出错就明明白白显示出来，不许"点了没反应"这种静默失败
window.addEventListener("error", e => {
  const el = document.getElementById("flash");
  el.textContent = "❌ 页面出错：" + e.message;
  el.style.display = "block";
});

let KEY, META_KEY, SYNC_KEY, TITLE_KEY, STATUS_KEY, MSG_KEY, DOING_KEY, LOG_KEY;   // 具体值按当前档案在applyProfile()里赋

// ---------- 日期（用本地时间，不能用toISOString——那是UTC，晚上8点后会差一天） ----------
const dateStr = d => {
  const p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};
const todayStr = () => dateStr(new Date());
const yesterdayStr = () => dateStr(new Date(Date.now() - 864e5));
// 到期日还差几天：正=还剩，0=今天到期，负=已超期
const daysUntil = due =>
  Math.round((new Date(due + "T00:00:00") - new Date(todayStr() + "T00:00:00")) / 864e5);

// ---------- 周期（频率的时间单位：天/周/月） ----------
const parseDate = ds => {
  const [y, m, d] = ds.split("-").map(Number);
  return new Date(y, m - 1, d);          // 手动拆，避开 new Date("...") 的UTC时区坑
};

// 一个日期所属周期的"起点日"：天=当天，周=那周的周一，月=那月的1号
// 两个日期起点相同 = 同一周期
function periodKey(ds, period) {
  const d = parseDate(ds);
  if (period === "周") d.setDate(d.getDate() - (d.getDay() + 6) % 7);
  if (period === "月") d.setDate(1);
  return dateStr(d);
}

const dayBefore = ds => {
  const d = parseDate(ds);
  d.setDate(d.getDate() - 1);
  return dateStr(d);
};

const unitOf = p => p === "月" ? "个月" : p;   // 连续3天/3周/3个月

// 某天距今几天 + 文字（用于"完成后保留"的任务）
const daysAgo = ds => Math.round((parseDate(todayStr()) - parseDate(ds)) / 864e5);
const agoText = ds => { const n = daysAgo(ds); return n <= 0 ? "今天" : `${n}天前`; };

// ---------- 数据（与Python版tasks.json字段完全一致，可互相导入导出） ----------
// ---------- 双人档案：我的/她的，所有存储键按档案加后缀，数据完全独立 ----------
let profile = localStorage.getItem("adhd_profile") || "1";

function applyProfile() {
  const sfx = profile === "1" ? "" : "_2";   // 档案1沿用旧键名，老数据无缝继承
  KEY = "adhd_tasks_v1" + sfx;
  META_KEY = "adhd_updated_at" + sfx;        // 本地数据的最后修改时间，云同步靠它比新旧
  SYNC_KEY = "adhd_sync_url" + sfx;          // 同步码（两个档案各有各的，互不干扰）
  TITLE_KEY = "adhd_title" + sfx;            // 自定义清单名称
  STATUS_KEY = "adhd_status" + sfx;          // 旧版单条状态（仅迁移用）
  MSG_KEY = "adhd_msgs" + sfx;               // 留言列表 [{text, at}...] 新的在前
  DOING_KEY = "adhd_doing" + sfx;            // 正在做 {name, note, at} 或 null
  LOG_KEY = "adhd_log" + sfx;                // 完成流水 [{name, at}...]，用于每日回顾
  syncUrl = localStorage.getItem(SYNC_KEY) || "";
}

const getTitle = () =>
  localStorage.getItem(TITLE_KEY) || (profile === "1" ? "我的待办" : "她的待办");

const load = () => JSON.parse(localStorage.getItem(KEY) || "[]");
const getUpdatedAt = () => parseInt(localStorage.getItem(META_KEY) || "0");

let pushTimer;
const save = () => {
  localStorage.setItem(KEY, JSON.stringify(tasks));
  localStorage.setItem(META_KEY, String(Date.now()));
  // 稍微攒一下再推云端：连点8次打卡只发一次请求
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushCloud, 400);
};

function fixOldTasks(list) {
  // 不用 ??= 这类新语法：老手机浏览器解析不了会让整个脚本罢工
  for (const t of list) {
    if (t.last_done === undefined) t.last_done = "";
    if (t.times === undefined) t.times = 1;
    if (t.left === undefined) t.left = t.done ? 0 : 1;
    if (t.streak === undefined) t.streak = 0;
    if (t.last_full === undefined) t.last_full = "";
    if (t.subs === undefined) t.subs = [];   // 备注/分解步骤 [{name, done}]
    if (t.due === undefined) t.due = "";     // 近期任务的到期日（倒计时）
    if (t.period === undefined) t.period = "天";   // 频率单位：天/周/月，旧任务都是每天
    if (t.track === undefined) t.track = false;    // true=完成后保留不重置，只显示上次时间
  }
}

function resetDailyTasks(list) {
  // 进入新周期（新的一天/一周/一月）就复原；周期内保持原状
  for (const t of list) {
    if (t.category !== "日常" || t.track) continue;   // track任务不自动重置
    if (!t.last_done || periodKey(t.last_done, t.period) !== periodKey(todayStr(), t.period)) {
      t.done = false;
      t.left = t.times;
    }
  }
}

// 近期任务再按时间分流：截止日在7天以外的是Upcoming，7天以内/没填日期的是"近一周"
const isUpcoming = t => t.category === "近期" && t.due && daysUntil(t.due) > 7;

// ↑↓排序时的"同区"判定：近一周和Upcoming算两个区
const groupOf = t => t.category === "近期" ? (isUpcoming(t) ? "近期远" : "近期近") : t.category;

function visibleTasks() {
  // 顺序 = 页面顺序：近一周 → Upcoming → 日常 → 兴趣；各区内部按数组顺序（↑↓手动调整）
  const sec = c => tasks.filter(t => !t.done && t.category === c);
  const recent = sec("近期");
  return [
    ...recent.filter(t => !isUpcoming(t)),
    ...recent.filter(isUpcoming),
    ...sec("日常"),
    ...sec("兴趣"),
  ];
}

function moveTask(t, dir) {
  // 只在同一区内挪：找到本区可见任务里的上/下一个，交换两者在tasks数组里的位置
  const section = tasks.filter(x => !x.done && groupOf(x) === groupOf(t));
  const neighbor = section[section.indexOf(t) + dir];
  if (!neighbor) return;   // 已经在区顶/区底
  const i = tasks.indexOf(t), j = tasks.indexOf(neighbor);
  [tasks[i], tasks[j]] = [tasks[j], tasks[i]];
  save();
  render();
}

// 完成流水：每打卡一次记一条，只留最近60天，供"回顾"按天统计
const getLog = () => JSON.parse(localStorage.getItem(LOG_KEY) || "[]");
function logDone(name) {
  const cut = Date.now() - 60 * 864e5;
  const a = getLog().filter(e => e.at >= cut);
  a.push({ name, at: Date.now() });
  localStorage.setItem(LOG_KEY, JSON.stringify(a));
}

function checkIn(t) {
  t.left -= 1;
  t.last_done = todayStr();
  logDone(t.name);
  if (t.left > 0) {
    flash(`👍 ${t.name} +1（${t.times - t.left}/${t.times}）`);
  } else {
    t.done = true;
    if (t.category === "日常" && !t.track) {
      // streak按周期数：上个周期（昨天/上周/上月）也做满了就+1，否则从1重新数
      const curKey = periodKey(todayStr(), t.period);
      const prevKey = periodKey(dayBefore(curKey), t.period);
      t.streak = (t.last_full && periodKey(t.last_full, t.period) === prevKey) ? t.streak + 1 : 1;
      t.last_full = todayStr();
      const fire = t.streak >= 2 ? `　🌱连续${t.streak}${unitOf(t.period)}！` : "";
      flash(`✅ 完成：${t.name}，干得漂亮！${fire}`);
    } else {
      flash(`✅ 完成：${t.name}，干得漂亮！`);
    }
    if (visibleTasks().length === 0) setTimeout(() => flash("🎉 全部完成！去玩吧！"), 1600);
  }
  // 完成的正是"正在做"的事 → 自动结束"正在做"
  const dg = getDoing();
  if (t.done && dg && dg.name === t.name) localStorage.removeItem(DOING_KEY);
  save(); render(); renderDoing();
}

// ---------- 留言板：两人的"正在干嘛"和留言，合并成一条时间线 ----------
function ago(ts) {
  const m = Math.round((Date.now() - ts) / 60000);
  if (m < 1) return "刚刚";
  if (m < 60) return `${m}分钟前`;
  const h = Math.round(m / 60);
  if (h < 24) return `${h}小时前`;
  return `${Math.round(h / 24)}天前`;
}

const getMsgs = () => JSON.parse(localStorage.getItem(MSG_KEY) || "[]");

// TA的留言：读"另一个档案"的同步码（如果这台设备配置过），直接拉云端文档
let otherMsgsCache = [];
let otherLogCache = [];   // TA的完成流水，供"回顾"把两人的已完成合并展示

async function fetchOtherBoard() {
  const otherSfx = profile === "1" ? "_2" : "";
  const url = localStorage.getItem("adhd_sync_url" + otherSfx) || "";
  if (!url) { otherMsgsCache = []; otherLogCache = []; otherDoingCache = null; renderBoard(); renderDoing(); renderReview(); return; }
  try {
    const res = await fetch(url);
    const doc = await res.json();
    otherMsgsCache = (doc && doc.messages) ? doc.messages
      : (doc && doc.status && doc.status.text ? [doc.status] : []);
    otherLogCache = (doc && Array.isArray(doc.log)) ? doc.log : [];
    otherDoingCache = (doc && doc.doing) ? doc.doing : null;
  } catch { /* 拉不到就保持上次的 */ }
  renderBoard();
  renderDoing();
  renderReview();
}

function postMsg() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;
  const msgs = getMsgs();
  msgs.unshift({ text, at: Date.now() });                            // 新的在最前
  localStorage.setItem(MSG_KEY, JSON.stringify(msgs.slice(0, 50)));  // 最多留50条
  input.value = "";
  save();          // 留言随云同步走，TA那边就能看到
  renderBoard();
  renderReview();
}
document.getElementById("msgSend").onclick = postMsg;
document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") postMsg();
});

function startOfToday() { const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime(); }

function renderBoard() {
  const otherP = profile === "1" ? "2" : "1";
  const t0 = startOfToday();
  // 留言板只展示当天的；更早的都在"回顾"里
  const mine = getMsgs().filter(m => m.at >= t0).map(m => ({ ...m, mine: true }));
  const theirs = otherMsgsCache.filter(m => m.at >= t0).map(m => ({ ...m, mine: false }));
  const all = mine.concat(theirs).sort((a, b) => b.at - a.at);   // 两人合并成一条时间线

  const list = document.getElementById("msgList");
  const more = document.getElementById("msgMore");
  list.innerHTML = "";

  const shown = all;
  for (const m of shown) {
    const line = document.createElement("div");
    line.className = "msg" + (m.mine ? "" : " other");
    const span = document.createElement("span");
    span.textContent =
      `${m.mine ? "💬" : "👀"} ${profileLabel(m.mine ? profile : otherP)}：${m.text}（${ago(m.at)}）`;
    line.append(span);
    if (m.mine) {   // 只能删自己的留言
      const del = document.createElement("button");
      del.textContent = "✕";
      del.onclick = () => {
        localStorage.setItem(MSG_KEY, JSON.stringify(getMsgs().filter(x => x.at !== m.at)));
        save();
        renderBoard();
      };
      line.append(del);
    }
    list.append(line);
  }

  if (!all.length) {
    const hint = document.createElement("div");
    hint.className = "msg other";
    hint.textContent = "今天还没有留言";
    list.append(hint);
  }
  more.style.display = "none";   // 历史留言都在"回顾"里，这里不再翻页
}

// 每分钟重算一次"xx分钟前"的字样（不发网络请求）
setInterval(() => { renderBoard(); renderDoing(); renderReview(); }, 60000);

// ---------- 正在做：点任务的"在做"按钮，置顶显示"某某正在做什么" ----------
const getDoing = () => JSON.parse(localStorage.getItem(DOING_KEY) || "null");
let otherDoingCache = null;   // TA正在做的事（从对方档案云文档读来）

function setDoing(t) {
  localStorage.setItem(DOING_KEY, JSON.stringify({ name: t.name, note: "", at: Date.now() }));
  save();                    // 随云同步走，TA那边就能看到
  renderDoing();
  flash(`▶ 开始：${t.name}`);
}

function clearDoing() {
  localStorage.removeItem(DOING_KEY);
  save();
  renderDoing();
}

function editDoingNote() {
  const mine = getDoing();
  if (!mine) return;
  const meRow = document.querySelector("#doingBox .doing-me");
  if (!meRow || meRow.querySelector("input")) return;
  meRow.innerHTML = "";
  const input = document.createElement("input");
  input.type = "text";
  input.maxLength = 40;
  input.value = mine.note || "";
  input.placeholder = "加个备注，比如：写第三章";
  input.className = "doing-note-input";
  meRow.append(input);
  input.focus();
  input.onblur = () => {
    const cur = getDoing();
    if (cur) { cur.note = input.value.trim(); localStorage.setItem(DOING_KEY, JSON.stringify(cur)); save(); }
    renderDoing();
  };
  input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
}

function renderDoing() {
  const box = document.getElementById("doingBox");
  const mine = getDoing();
  const other = otherDoingCache;
  if (!mine && !other) { box.style.display = "none"; return; }
  box.style.display = "";
  box.innerHTML = "";
  const otherP = profile === "1" ? "2" : "1";

  if (mine) {
    const row = document.createElement("div");
    row.className = "doing-me";
    const span = document.createElement("span");
    span.title = "点一下加/改备注";
    span.textContent =
      `🎯 ${profileLabel(profile)} 正在做：${mine.name}${mine.note ? " · " + mine.note : ""}（${ago(mine.at)}）`;
    span.onclick = editDoingNote;
    const x = document.createElement("button");
    x.textContent = "✕";
    x.title = "结束";
    x.onclick = clearDoing;
    row.append(span, x);
    box.append(row);
  }
  if (other) {
    const row = document.createElement("div");
    row.className = "doing-other";
    row.textContent =
      `👀 ${profileLabel(otherP)} 正在做：${other.name}${other.note ? " · " + other.note : ""}（${ago(other.at)}）`;
    box.append(row);
  }
}

// ---------- 回顾：按天展示完成情况和留言 ----------
let reviewOpen = false;
let calYear, calMonth, selectedDay;   // 当前查看的月份 + 选中的那天

document.getElementById("reviewBtn").onclick = () => {
  reviewOpen = !reviewOpen;
  if (reviewOpen) {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
    selectedDay = todayStr();   // 默认落在今天
    fetchOtherBoard();          // 打开时拉一次对方的完成记录/留言，保证是最新的
  }
  renderReview();
};

const closeReview = () => { reviewOpen = false; renderReview(); };
document.getElementById("reviewClose").onclick = closeReview;
document.getElementById("reviewModal").onclick = e => {
  if (e.target.id === "reviewModal") closeReview();   // 点半透明遮罩关闭
};

function shiftMonth(delta) {
  const target = new Date(calYear, calMonth + delta, 1);
  const now = new Date();
  const curMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  if (target > curMonthStart) return;   // 未来没有记录，不往后翻
  calYear = target.getFullYear();
  calMonth = target.getMonth();
  renderReview();
}
document.getElementById("calPrev").onclick = () => shiftMonth(-1);
document.getElementById("calNext").onclick = () => shiftMonth(1);

function reviewDateLabel(k) {
  const d = parseDate(k);
  const week = "日一二三四五六"[d.getDay()];
  const n = daysAgo(k);
  const rel = n === 0 ? " · 今天" : (n === 1 ? " · 昨天" : "");
  return `${d.getMonth() + 1}月${d.getDate()}日 周${week}${rel}`;
}
const timeHM = at => { const d = new Date(at), p = n => String(n).padStart(2, "0");
  return `${p(d.getHours())}:${p(d.getMinutes())}`; };

// 把两人的完成流水和留言按天归拢：key="YYYY-MM-DD" -> {mineDone, theirsDone, msgs}
function buildReviewAgg() {
  const agg = {};
  const dkey = at => dateStr(new Date(at));
  const ensure = k => (agg[k] || (agg[k] = { mineDone: {}, theirsDone: {}, msgs: [] }));
  for (const e of getLog()) { const d = ensure(dkey(e.at)).mineDone; d[e.name] = (d[e.name] || 0) + 1; }
  for (const e of otherLogCache) { const d = ensure(dkey(e.at)).theirsDone; d[e.name] = (d[e.name] || 0) + 1; }
  for (const m of getMsgs()) ensure(dkey(m.at)).msgs.push({ text: m.text, at: m.at, mine: true });
  for (const m of otherMsgsCache) ensure(dkey(m.at)).msgs.push({ text: m.text, at: m.at, mine: false });
  return agg;
}

const hasAny = a => a && (Object.keys(a.mineDone).length || Object.keys(a.theirsDone).length || a.msgs.length);

function renderReview() {
  const modal = document.getElementById("reviewModal");
  document.getElementById("reviewBtn").classList.toggle("active-btn", reviewOpen);
  if (!reviewOpen) { modal.style.display = "none"; return; }
  modal.style.display = "flex";

  const agg = buildReviewAgg();
  const today = todayStr();
  const p = n => String(n).padStart(2, "0");

  document.getElementById("calMonth").textContent = `${calYear}年${calMonth + 1}月`;
  // 已经在当月了就把"下个月"按钮置灰（未来没有记录）
  const atCurMonth = calYear === new Date().getFullYear() && calMonth === new Date().getMonth();
  document.getElementById("calNext").classList.toggle("disabled", atCurMonth);

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  for (const w of ["一", "二", "三", "四", "五", "六", "日"]) {
    const h = document.createElement("div");
    h.className = "cal-wk";
    h.textContent = w;
    grid.append(h);
  }
  const offset = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;   // 周一起始，和全站一致
  for (let i = 0; i < offset; i++) {
    const b = document.createElement("div");
    b.className = "cal-cell blank";
    grid.append(b);
  }
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const key = `${calYear}-${p(calMonth + 1)}-${p(day)}`;
    const a = agg[key];
    const isFuture = key > today;

    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if (isFuture) cell.classList.add("future");
    if (hasAny(a)) cell.classList.add("has-act");
    if (key === today) cell.classList.add("today");
    if (key === selectedDay) cell.classList.add("selected");

    const num = document.createElement("div");
    num.textContent = day;
    cell.append(num);

    // 圆点：谁那天有动静（完成或留言）就亮谁的颜色
    const dots = document.createElement("div");
    dots.className = "cal-dots";
    const mineAct = a && (Object.keys(a.mineDone).length || a.msgs.some(m => m.mine));
    const otherAct = a && (Object.keys(a.theirsDone).length || a.msgs.some(m => !m.mine));
    if (mineAct) { const d = document.createElement("div"); d.className = "cal-dot mine"; dots.append(d); }
    if (otherAct) { const d = document.createElement("div"); d.className = "cal-dot other"; dots.append(d); }
    cell.append(dots);

    if (!isFuture) cell.onclick = () => { selectedDay = key; renderReview(); };
    grid.append(cell);
  }

  renderDayDetail(agg[selectedDay]);
}

function renderDayDetail(a) {
  const box = document.getElementById("dayDetail");
  box.innerHTML = "";
  const otherP = profile === "1" ? "2" : "1";

  const head = document.createElement("div");
  head.className = "review-date";
  head.textContent = reviewDateLabel(selectedDay);
  box.append(head);

  if (!hasAny(a)) {
    const e = document.createElement("div");
    e.className = "review-empty";
    e.textContent = "这天没有记录～轻轻翻过就好 🍃";
    box.append(e);
    return;
  }

  // 已完成：分人一行，✓ 名字用各自颜色标出是谁
  const doneRow = (label, cls, doneMap) => {
    const names = Object.keys(doneMap);
    if (!names.length) return;
    const line = document.createElement("div");
    line.className = "review-done";
    const who = document.createElement("span");
    who.className = cls;
    who.textContent = `✓ ${label}：`;
    line.append(who, document.createTextNode(
      names.map(n => doneMap[n] > 1 ? `${n}×${doneMap[n]}` : n).join(" · ")));
    box.append(line);
  };
  doneRow(profileLabel(profile), "p-mine", a.mineDone);
  doneRow(profileLabel(otherP), "p-other", a.theirsDone);

  // 留言：当天时间线
  const msgs = a.msgs.slice().sort((x, y) => x.at - y.at);
  for (const m of msgs) {
    const line = document.createElement("div");
    line.className = "review-msg" + (m.mine ? "" : " other");
    const who = document.createElement("span");
    who.className = m.mine ? "p-mine" : "p-other";
    who.textContent = profileLabel(m.mine ? profile : otherP);
    line.append(
      document.createTextNode(`${m.mine ? "💬" : "👀"} ${timeHM(m.at)} `),
      who,
      document.createTextNode(`：${m.text}`));
    box.append(line);
  }
}

const expandedSubs = new Set();   // 记住哪些任务的步骤面板展开着（只在本次打开期间有效）

function subsPanel(t) {
  const panel = document.createElement("div");
  panel.className = "subs";

  t.subs.forEach((s, i) => {
    const line = document.createElement("div");
    line.className = "sub-line";

    const box = document.createElement("input");
    box.type = "checkbox";
    box.checked = s.done;
    box.onchange = () => { s.done = box.checked; save(); render(); };

    const name = document.createElement("span");
    name.className = "sub-name" + (s.done ? " sub-done" : "");
    name.textContent = s.name;

    const del = document.createElement("button");
    del.textContent = "✕";
    del.onclick = () => { t.subs.splice(i, 1); save(); render(); };

    line.append(box, name, del);
    panel.append(line);
  });

  const addRow = document.createElement("div");
  addRow.className = "sub-add";
  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "写条备注，或拆一小步…";
  const addBtn = document.createElement("button");
  addBtn.textContent = "添加";
  const submit = () => {
    const name = input.value.trim();
    if (!name) return;
    t.subs.push({ name, done: false });
    save(); render();
  };
  addBtn.onclick = submit;
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  addRow.append(input, addBtn);
  panel.append(addRow);

  return panel;
}

function taskCard(t) {
  const card = document.createElement("div");
  card.className = "card";

  const row = document.createElement("div");
  row.className = "row";

  const info = document.createElement("div");
  info.className = "info";
  const mark = (t.category === "近期" && t.priority === 1) ? "🎯 " : "";
  let fire = "";
  if (t.category === "日常" && t.streak >= 2 && t.last_full) {
    // 上个周期做满、本周期还没做完 → 提示连击待续
    const prevKey = periodKey(dayBefore(periodKey(todayStr(), t.period)), t.period);
    if (periodKey(t.last_full, t.period) === prevKey) {
      fire = ` <span class="fire">🌱${t.streak}${unitOf(t.period)}连续中</span>`;
    }
  }
  info.innerHTML = `<span class="name"></span>${fire}`;
  info.querySelector(".name").textContent = `${mark}${t.name}`;
  // 近期任务的倒计时（中性灰色小字，超期也不用红色吓人）
  if (t.category === "近期" && t.due) {
    const d = daysUntil(t.due);
    const due = document.createElement("span");
    due.className = "due";
    due.textContent = d > 0 ? `⏳还剩${d}天` : (d === 0 ? "⏳今天到期" : `已超${-d}天`);
    info.querySelector(".name").after(due);
  }
  if (t.times > 1) {
    const doneTimes = t.times - t.left;
    const span = t.period === "周" ? "本周 " : (t.period === "月" ? "本月 " : "");
    info.innerHTML += `
      <div class="track"><div class="fill" style="width:${doneTimes / t.times * 100}%"></div></div>
      <div class="count">${span}${doneTimes}/${t.times}</div>`;
  }
  // 有备注就把第一条未勾的顶在脸上（一次只看一小步），全勾完/没备注就空白
  const next = t.subs.find(s => !s.done);
  if (next) {
    const nextDiv = document.createElement("div");
    nextDiv.className = "next-step";
    nextDiv.textContent = `▸ ${next.name}`;
    info.append(nextDiv);
  }

  // 点任务本身 = 展开/收起内层编辑面板
  info.title = "点击编辑";
  info.onclick = () => {
    expandedSubs.has(t) ? expandedSubs.delete(t) : expandedSubs.add(t);
    render();
  };

  const doingBtn = document.createElement("button");
  doingBtn.className = "doing-btn";
  doingBtn.textContent = "▶";
  doingBtn.title = "标记我正在做这件事";
  doingBtn.onclick = () => setDoing(t);

  const btn = document.createElement("button");
  btn.className = "check-btn";
  btn.textContent = "✓";
  btn.title = "打卡完成";
  btn.onclick = () => checkIn(t);

  row.append(info, doingBtn, btn);
  card.append(row);
  if (expandedSubs.has(t)) card.append(editPanel(t));
  return card;
}

function editPanel(t) {
  const panel = document.createElement("div");
  panel.className = "subs";

  // 名称：改完按回车或点别处，自动保存
  const nameRow = document.createElement("div");
  nameRow.className = "edit-row";
  const nameInput = document.createElement("input");
  nameInput.type = "text";
  nameInput.value = t.name;
  nameInput.onchange = () => {
    const v = nameInput.value.trim();
    if (v && v !== t.name) { t.name = v; save(); render(); }
  };
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") nameInput.blur(); });
  nameRow.append(nameInput);
  panel.append(nameRow);

  // 类别 + 每天次数
  const optRow = document.createElement("div");
  optRow.className = "edit-row";
  const catSel = document.createElement("select");
  for (const c of ["日常", "近期", "兴趣"]) {
    const o = document.createElement("option");
    o.value = o.textContent = c;
    if (c === t.category) o.selected = true;
    catSel.append(o);
  }
  catSel.onchange = () => { t.category = catSel.value; save(); render(); };
  optRow.append(catSel);

  if (t.category === "日常") {
    const pre = document.createElement("span");
    pre.textContent = "每";
    const periodSel = document.createElement("select");
    for (const p of ["天", "周", "月"]) {
      const o = document.createElement("option");
      o.value = o.textContent = p;
      if (p === t.period) o.selected = true;
      periodSel.append(o);
    }
    periodSel.onchange = () => {
      t.period = periodSel.value;   // 完成状态和次数保持原样，下次重置按新周期算
      save(); render();
    };
    const timesInput = document.createElement("input");
    timesInput.type = "number";
    timesInput.min = 1;
    timesInput.max = 50;
    timesInput.value = t.times;
    timesInput.onchange = () => {
      const n = Math.max(1, parseInt(timesInput.value) || t.times);
      const doneTimes = t.times - t.left;      // 本周期已做的次数不作废
      t.times = n;
      t.left = Math.max(n - doneTimes, 0);
      if (t.left === 0) t.done = true;
      save(); render();
    };
    const post = document.createElement("span");
    post.textContent = "次";
    if (!t.track) optRow.append(pre, periodSel, timesInput, post);   // track模式没有频率概念
  }

  if (t.category === "近期") {
    const pre = document.createElement("span");
    pre.textContent = "截止";
    const dueInput = document.createElement("input");
    dueInput.type = "date";                 // 存的就是日期，倒计时随时间自然减少
    dueInput.value = t.due;
    dueInput.onchange = () => {
      t.due = dueInput.value;               // 清空日期 = 不限期
      save(); render();
    };
    const post = document.createElement("span");
    post.textContent = "（清空=不限）";
    optRow.append(pre, dueInput, post);
  }
  panel.append(optRow);

  // 日常任务的"完成后保留"开关
  if (t.category === "日常") {
    const trackRow = document.createElement("label");
    trackRow.className = "edit-row";
    trackRow.style.cursor = "pointer";
    const box = document.createElement("input");
    box.type = "checkbox";
    box.checked = !!t.track;
    box.onchange = () => { t.track = box.checked; save(); render(); };
    trackRow.append(box, document.createTextNode("完成后保留·显示上次时间（不自动重置）"));
    panel.append(trackRow);
  }

  // 备注清单
  panel.append(subsPanel(t));

  // 排序、放弃
  const actions = document.createElement("div");
  actions.className = "panel-actions";
  const up = document.createElement("button");
  up.textContent = "▲ 上移";
  up.onclick = () => moveTask(t, -1);
  const down = document.createElement("button");
  down.textContent = "▼ 下移";
  down.onclick = () => moveTask(t, +1);
  const spacer = document.createElement("div");
  spacer.className = "spacer";
  const drop = document.createElement("button");
  drop.textContent = "🗑 放弃";
  drop.onclick = () => {
    if (confirm(`确定放弃「${t.name}」？`)) {
      tasks.splice(tasks.indexOf(t), 1);
      save(); render();
      flash(`🗑 已放弃：${t.name}。放弃也是决策，给大脑腾地方 👍`);
    }
  };
  actions.append(up, down, spacer, drop);
  panel.append(actions);

  return panel;
}

function section(main, title, list) {
  const h = document.createElement("h2");
  h.textContent = title;
  main.append(h);
  list.forEach(t => main.append(taskCard(t)));
}

function restoreTask(t) {
  // 点已完成的任务 = 撤销最后一次打卡
  t.done = false;
  if (t.left <= 0) t.left = 1;
  // 把今天这条完成流水也撤掉，回顾才对得上
  const log = getLog();
  for (let i = log.length - 1; i >= 0; i--) {
    if (log[i].name === t.name && dateStr(new Date(log[i].at)) === todayStr()) { log.splice(i, 1); break; }
  }
  localStorage.setItem(LOG_KEY, JSON.stringify(log));
  const curKey = t.category === "日常" ? periodKey(todayStr(), t.period) : "";
  if (t.category === "日常" && !t.track && t.last_full && periodKey(t.last_full, t.period) === curKey) {
    // 本周期刚给的连击也一并撤回；streak-1>0说明上个周期做满过，last_full回到上个周期正好
    t.streak = Math.max(t.streak - 1, 0);
    t.last_full = t.streak > 0 ? dayBefore(curKey) : "";
  }
  save(); render();
  flash(`↩ 已还原：${t.name}`);
}

function doneLine(t) {
  const line = document.createElement("div");
  line.className = "done-line";
  line.title = "点击还原";
  const fire = (t.category === "日常" && !t.track && t.streak >= 2) ? ` 🌱×${t.streak}` : "";
  // "完成后保留"的任务，名字后面标"N天前"
  const ago = (t.track && t.last_done) ? ` <span class="due">${agoText(t.last_done)}</span>` : "";
  line.innerHTML = `✅ <s></s>${fire}${ago}`;
  line.querySelector("s").textContent = t.name;
  line.title = t.track ? "点击重新开始" : "点击还原";
  line.onclick = () => restoreTask(t);
  return line;
}

// 折叠组的开合状态（只在本次打开期间记住，刷新后回到默认收起）
const ui = { recentDoneOpen: false, interestOpen: false, dormantOpen: false, boardOpen: false, upcomingOpen: false };

function fold(title, cls, openKey) {
  const det = document.createElement("details");
  det.className = cls;
  det.open = ui[openKey];
  const sum = document.createElement("summary");
  sum.textContent = title;
  det.append(sum);
  det.addEventListener("toggle", () => { ui[openKey] = det.open; });
  return det;
}

function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const vis = visibleTasks();
  const recent = vis.filter(t => t.category === "近期");
  const daily = vis.filter(t => t.category === "日常");
  const interest = vis.filter(t => t.category === "兴趣");
  const dailyDone = tasks.filter(t => t.done && t.category === "日常");
  const recentDone = tasks.filter(t => t.done && t.category === "近期");
  const interestDone = tasks.filter(t => t.done && t.category === "兴趣");

  renderReview();   // 回顾开着时，完成/还原后同步刷新

  // 今日战报：今天打过卡的都算，日常带次数（喝水×3），一件没做就整条隐藏
  const strip = document.getElementById("todayDone");
  const parts = [];
  for (const t of tasks) {
    if (t.last_done !== todayStr()) continue;
    if (t.category === "日常") {
      // ×n只对"每天"有意义；周/月任务的次数横跨整个周期，今天打过卡就报名字
      const n = t.times - t.left;
      if (n > 0) parts.push(t.period === "天" && n > 1 ? `${t.name}×${n}` : t.name);
    } else if (t.done) {
      parts.push(t.name);
    }
  }
  if (parts.length) {
    strip.textContent = `✨ 今日已完成：${parts.join(" · ")}`;
    strip.style.display = "";
  } else {
    strip.style.display = "none";
  }

  if (vis.length === 0) {
    const div = document.createElement("div");
    div.className = "empty";
    div.textContent = "🎉 全部完成！去玩吧！";
    main.append(div);
  }

  // 分区顺序：近一周 → Upcoming（折叠）→ 日常 → 兴趣（折叠）
  const week = recent.filter(t => !isUpcoming(t));
  const upcoming = recent.filter(isUpcoming);
  if (week.length || upcoming.length || recentDone.length) {
    if (week.length) section(main, "📌 近一周", week);
    if (upcoming.length) {
      // 一周以外的事先收起来；日子临近7天时会自动浮上来到"近一周"
      const det = fold(`🗓 Upcoming（${upcoming.length}）· 一周以后`, "fold section", "upcomingOpen");
      upcoming.forEach(t => det.append(taskCard(t)));
      main.append(det);
    }
    if (recentDone.length) {
      const det = fold(`✅ 已完成（${recentDone.length}）`, "fold", "recentDoneOpen");
      recentDone.forEach(t => det.append(doneLine(t)));
      main.append(det);
    }
  }

  if (daily.length || dailyDone.length) {
    section(main, `💙 日常（还剩${daily.length}件）`, daily);
    // 今天完成的（会重置的）直接亮出来（成就感+可反悔）
    dailyDone.filter(t => !t.track && t.last_done === todayStr())
             .forEach(t => main.append(doneLine(t)));
    // "完成后保留"的任务：始终留在这里，标"N天前"，点它才重新开始
    dailyDone.filter(t => t.track).forEach(t => main.append(doneLine(t)));
    // 周期内早前完成的低频任务（周一洗的床单）休眠折叠，下个周期自动回到待办
    const dormant = dailyDone.filter(t => !t.track && t.last_done !== todayStr());
    if (dormant.length) {
      const det = fold(`💤 本周期已完成（${dormant.length}）`, "fold", "dormantOpen");
      dormant.forEach(t => det.append(doneLine(t)));
      main.append(det);
    }
  }

  // 兴趣区默认折叠：闲暇时才需要打开看；完成的也保留在里面，点击可还原
  if (interest.length || interestDone.length) {
    const det = fold(`💡 兴趣（${interest.length}）`, "fold section", "interestOpen");
    interest.forEach(t => det.append(taskCard(t)));
    interestDone.forEach(t => det.append(doneLine(t)));
    main.append(det);
  }
}

// ---------- ☁ 云同步 ----------
// 原理：云端只存一份 {updated_at, tasks}，谁的时间戳新听谁的（last-write-wins）。
// 打开页面/切回页面时拉取；每次本地改动后推送。断网也能用，联网后自动补推。
let syncUrl = "";   // 当前档案的同步码，applyProfile()里读取

function setSyncState(txt) {
  document.getElementById("syncState").textContent = txt;
}
const syncOK = () => setSyncState(
  `已同步 ${new Date().toTimeString().slice(0, 5)}`);
const syncFail = () => setSyncState("⚠ 连不上云端（数据仍在本地）");

async function pushCloud() {
  if (!syncUrl) return;
  try {
    const res = await fetch(syncUrl, {
      method: "PUT",
      body: JSON.stringify({
        updated_at: getUpdatedAt(), tasks, title: getTitle(),
        messages: getMsgs(),
        status: getMsgs()[0] || null,   // 兼容：对方还没刷新到新版时也能看到最新一条
        doing: getDoing(),
        log: getLog(),
      }),
    });
    if (!res.ok) throw 0;
    syncOK();
  } catch { syncFail(); }
}

async function pullCloud() {
  if (!syncUrl) return;
  const myUrl = syncUrl;   // 记住发请求时的档案，响应回来时若已切换档案就丢弃
  try {
    const res = await fetch(myUrl);
    if (!res.ok) throw 0;
    const doc = await res.json();
    if (syncUrl !== myUrl) return;
    if (doc && Array.isArray(doc.tasks) && doc.updated_at > getUpdatedAt()) {
      // 云端更新：整份采用，并按今天的日期做日常重置
      tasks = doc.tasks;
      localStorage.setItem(KEY, JSON.stringify(tasks));
      localStorage.setItem(META_KEY, String(doc.updated_at));
      if (doc.title) { localStorage.setItem(TITLE_KEY, doc.title); renderTitle(); }
      if (doc.messages) {
        localStorage.setItem(MSG_KEY, JSON.stringify(doc.messages));
        renderBoard();
      } else if (doc.status) {
        localStorage.setItem(MSG_KEY, JSON.stringify([doc.status]));   // 旧格式云端文档
        renderBoard();
      }
      if (doc.doing !== undefined) {
        doc.doing ? localStorage.setItem(DOING_KEY, JSON.stringify(doc.doing))
                  : localStorage.removeItem(DOING_KEY);
        renderDoing();
      }
      if (doc.log) { localStorage.setItem(LOG_KEY, JSON.stringify(doc.log)); renderReview(); }
      const before = JSON.stringify(tasks);
      fixOldTasks(tasks);
      resetDailyTasks(tasks);
      if (JSON.stringify(tasks) !== before) save();   // 重置产生了变化才算新改动
      render();
    } else if (!doc || (doc.updated_at || 0) < getUpdatedAt()) {
      pushCloud();   // 云端是空的或更旧：把本地推上去
    }
    syncOK();
  } catch { syncFail(); }
}

function renderSyncPanel() {
  const on = !!syncUrl;
  document.getElementById("syncOff").style.display = on ? "none" : "";
  document.getElementById("syncOn").style.display = on ? "" : "none";
  document.getElementById("syncCode").value = syncUrl;
  if (!on) setSyncState("未开启");
}

document.getElementById("syncEnable").onclick = () => {
  let url = document.getElementById("syncInput").value.trim().replace(/\/+$/, "");
  // 设置类的错误用弹窗提示：闪一下的flash容易被错过，显得"点了没反应"
  if (!url) {
    alert("输入框是空的：请先粘贴数据库网址（或另一台设备的同步码）再点启用。");
    return;
  }
  if (url.includes("console.firebase.google.com")) {
    alert("你粘贴的是Firebase控制台页面的网址，不是数据库网址。\n\n" +
          "请在控制台里进入：构建 → Realtime Database → 数据 标签，\n" +
          "复制页面顶部形如\nhttps://xxx-default-rtdb.xxx.firebasedatabase.app\n的那个网址。");
    return;
  }
  if (!/^https?:\/\//.test(url)) url = "https://" + url;   // 没带https://就帮忙补上
  if (!url.includes(".")) {
    alert("网址看起来不完整，检查一下是否复制全了。");
    return;
  }
  if (!url.endsWith(".json")) {
    // 首次设置：在数据库网址后面拼一段随机秘密路径，这就是"密码"
    // （crypto.randomUUID只在https/localhost下有，file://双击打开时退回Math.random拼一串）
    const secret = crypto.randomUUID ? crypto.randomUUID() :
      Array.from({ length: 32 },
        () => "abcdefghijklmnopqrstuvwxyz0123456789"[Math.floor(Math.random() * 36)]).join("");
    url = `${url}/tasks/${secret}.json`;
  }
  syncUrl = url;
  localStorage.setItem(SYNC_KEY, url);
  renderSyncPanel();
  pullCloud();   // 云端有数据就拉下来（其他设备加入），没有就把本地推上去（首次）
  flash("☁ 同步已启用");
};

document.getElementById("syncDisable").onclick = () => {
  if (!confirm("断开云同步？本地数据保留，云端数据也不会删。")) return;
  syncUrl = "";
  localStorage.removeItem(SYNC_KEY);
  renderSyncPanel();
  flash("已断开同步，数据只存在本设备");
};

document.getElementById("syncCopy").onclick = async () => {
  const el = document.getElementById("syncCode");
  try {
    await navigator.clipboard.writeText(el.value);
    flash("📋 已复制，去另一台设备粘贴吧");
  } catch {
    el.select();   // 剪贴板API不可用时（如file://打开），退回手动复制
    flash("请按 Ctrl+C 复制选中的同步码");
  }
};

// 切回这个页面时拉一次云端（最多30秒一次），保证两台设备轮流用时数据是新的
let lastPull = 0;
function pullIfStale() {
  if (Date.now() - lastPull > 30000) {
    lastPull = Date.now();
    pullCloud();
    fetchOtherBoard();   // 顺便更新TA的留言
  }
}
window.addEventListener("focus", pullIfStale);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) pullIfStale();
});

// ---------- 启动 / 切换档案时的完整加载 ----------
let tasks = [];

function loadProfileState() {
  applyProfile();
  tasks = load();
  // 只有fix/重置真的改了数据才标记"本地更新"，否则新设备会误以为自己比云端新
  const before = JSON.stringify(tasks);
  fixOldTasks(tasks);
  resetDailyTasks(tasks);
  if (JSON.stringify(tasks) !== before) save();
  // 清掉上个档案的界面状态
  expandedSubs.clear();
  // 旧版的单条状态迁移成留言列表（只发生一次）
  if (!localStorage.getItem(MSG_KEY)) {
    const old = JSON.parse(localStorage.getItem(STATUS_KEY) || "null");
    if (old && old.text) localStorage.setItem(MSG_KEY, JSON.stringify([old]));
  }
  reviewOpen = false;     // 切档案回到收起状态
  otherDoingCache = null; // 清掉上个档案的"TA正在做"
  renderTitle();
  renderBoard();
  renderDoing();
  renderReview();
  render();
  renderSyncPanel();
  fetchOtherBoard();
  if (syncUrl) { lastPull = Date.now(); pullCloud(); }
}

loadProfileState();
</script>
</body>
</html>
